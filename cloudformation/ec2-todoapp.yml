AWSTemplateFormatVersion: '2010-09-09'
Description: TodoApp EC2 t2.micro with Docker

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
  InstanceType:
    Default: t2.micro
    Type: String

Resources:
  TodoAppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP/HTTPS
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0   # Restrict in production!
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  TodoAppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64:1}}'
      SecurityGroups:
        - !Ref TodoAppSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y docker

          # Install Docker Compose plugin (system-wide for AL2023)
          mkdir -p /usr/libexec/docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o /usr/libexec/docker/cli-plugins/docker-compose
          chmod +x /usr/libexec/docker/cli-plugins/docker-compose

          systemctl enable --now docker

          # Add user to docker group and make it effective immediately for future sessions
          usermod -aG docker ec2-user

          # Create a script that runs on next login to fix group
          echo '#!/bin/bash
          newgrp docker
          ' > /etc/profile.d/docker-group.sh
          chmod +x /etc/profile.d/docker-group.sh

          echo "Docker setup completed. Rebooting..."
          reboot
      Tags:
        - Key: Name
          Value: todoapp-prod
