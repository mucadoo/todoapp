services:
  db:
    image: postgres:16-alpine
    container_name: todoapp_db_prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: todoapp_backend_prod
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_db &&
             python manage.py collectstatic --no-input &&
             gunicorn --workers 3 --bind 0.0.0.0:8000 config.wsgi:application"

  frontend:
    build:
      context: ./frontend
    container_name: todoapp_frontend_prod
    depends_on:
      - backend
    ports:
      - "80:80"
    # SSL and other prod configs would go into nginx container

volumes:
  postgres_data_prod:
