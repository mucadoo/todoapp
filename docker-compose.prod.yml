version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: todoapp_db_prod
    restart: unless-stopped
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${GHCR_BACKEND_IMAGE:-ghcr.io/mucadoo/todoapp-backend:latest}
    container_name: backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_db &&
             python manage.py collectstatic --no-input &&
             gunicorn --workers 3 --bind 0.0.0.0:8000 config.wsgi:application"

  frontend:
    image: ${GHCR_FRONTEND_IMAGE:-ghcr.io/mucadoo/todoapp-frontend:latest}
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

networks:
  default:
    name: todoapp_prod_network

volumes:
  postgres_data_prod:
