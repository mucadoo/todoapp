name: CD - Manual Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy/Update CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/ec2-todoapp.yml \
            --stack-name todoapp-prod \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides KeyName=${{ secrets.EC2_KEY_NAME }} InstanceType=t2.micro

      - name: Get EC2 Public IP
        id: get-ip
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=todoapp-prod" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" --output text)
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Wait for EC2 to be reachable via SSH
        run: |
          max_attempts=40
          attempt=1
          until nc -zv -w5 ${{ env.EC2_IP }} 22 || [ $attempt -eq $max_attempts ]; do
            echo "Waiting for SSH on ${{ env.EC2_IP }} (Attempt $attempt/$max_attempts)..."
            sleep 15
            attempt=$((attempt+1))
          done
          if [ $attempt -eq $max_attempts ]; then
            echo "Timeout waiting for SSH"
            exit 1
          fi
          echo "SSH port is open. Waiting extra 30s for Docker to fully initialize..."
          sleep 30

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.EC2_IP }} >> ~/.ssh/known_hosts

      - name: Create .env for deployment
        run: |
          echo "POSTGRES_DB=todoapp_prod" >> .env
          echo "POSTGRES_USER=todo_user_prod" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "ALLOWED_HOSTS=*" >> .env
          echo "CORS_ALLOWED_ORIGINS=http://${{ env.EC2_IP }}" >> .env
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env
          echo "GITHUB_ACTOR=${{ github.actor }}" >> .env
          echo "GHCR_BACKEND_IMAGE=ghcr.io/${{ github.repository }}/todoapp-backend:latest" >> .env
          echo "GHCR_FRONTEND_IMAGE=ghcr.io/${{ github.repository }}/todoapp-frontend:latest" >> .env

      - name: Copy files to server
        run: |
          scp -i ~/.ssh/id_rsa deploy.sh docker-compose.prod.yml .env ${{ secrets.EC2_USER }}@${{ env.EC2_IP }}:~/

      - name: Execute remote deployment script
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ env.EC2_IP }} 'chmod +x deploy.sh && ./deploy.sh'
